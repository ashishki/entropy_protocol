schema_version: "1"
account_scope:
  - acct_public_sample_001
timezone: UTC
session:
  start: "00:00"
  end: "23:59"
rules:
  - rule_id: starter_hard_max_daily_loss
    type: max_daily_loss
    threshold: "1000"
    unit: USD
    params:
      rationale: "Approximate 1% daily-loss audit threshold for a 100000 USD example account."
  - rule_id: starter_hard_max_drawdown
    type: max_drawdown
    threshold: "3000"
    unit: USD
    params:
      rationale: "Approximate 3% drawdown audit threshold for a 100000 USD example account."
  - rule_id: starter_hard_cooldown_after_loss
    type: cooldown_after_loss
    threshold: "60"
    unit: minutes
    params:
      loss_threshold: "500"
      cooldown_minutes: 60
      rationale: "Strict cooldown after a material realized loss; useful for prop/funded or stress-test scenarios."
  - rule_id: starter_hard_max_position_size
    type: max_position_size
    threshold: "10000"
    unit: USD
    params:
      rationale: "Approximate 10% gross exposure cap for a 100000 USD example account."
  - rule_id: starter_hard_forbidden_assets
    type: forbidden_assets
    threshold: null
    unit: symbol
    params:
      symbols:
        - CUSTOM_FORBIDDEN_SYMBOL
      rationale: "Placeholder list; replace with trader-specific or account-specific forbidden assets."
