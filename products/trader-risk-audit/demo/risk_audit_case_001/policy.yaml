schema_version: "1"
account_scope:
  - demo_case_001
timezone: UTC
session:
  start: "09:30"
  end: "16:00"
rules:
  - rule_id: demo_max_daily_loss
    type: max_daily_loss
    threshold: "15"
    unit: USD
    params: {}
  - rule_id: demo_cooldown_after_loss
    type: cooldown_after_loss
    threshold: "45"
    unit: minutes
    params:
      loss_threshold: "10"
      cooldown_minutes: 45
  - rule_id: demo_forbidden_asset
    type: forbidden_assets
    threshold: null
    unit: symbol
    params:
      symbols:
        - BTCUSD
  - rule_id: demo_max_position_size
    type: max_position_size
    threshold: "10000"
    unit: USD
    params: {}
