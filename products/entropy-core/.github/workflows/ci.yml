name: Entropy Core CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Tests + Lint + Types
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: entropy
          POSTGRES_PASSWORD: entropy
          POSTGRES_DB: entropy_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: products/entropy-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/entropy tests

      - name: Format check
        run: ruff format --check src/entropy tests

      - name: Type check
        run: pyright src/entropy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://entropy:entropy@localhost:5432/entropy_test
          ENTROPY_DATA_DIR: ./data/test_market
          ENTROPY_REGISTRY_DIR: ./artifacts/test_registry
          LOG_LEVEL: INFO
        run: python -m pytest -q tests/
