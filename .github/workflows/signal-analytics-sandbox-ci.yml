name: Signal Analytics Sandbox CI

on:
  push:
    branches: ["master", "main"]
    paths:
      - "products/signal-analytics-sandbox/**"
      - ".github/workflows/signal-analytics-sandbox-ci.yml"
  pull_request:
    branches: ["master", "main"]
    paths:
      - "products/signal-analytics-sandbox/**"
      - ".github/workflows/signal-analytics-sandbox-ci.yml"

jobs:
  signal-analytics-sandbox:
    name: Signal Analytics Sandbox
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/signal-analytics-sandbox

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: products/signal-analytics-sandbox/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      - name: Lint (ruff check)
        run: ruff check src/ tests/

      - name: Format check (ruff format)
        run: ruff format --check src/ tests/

      - name: Type-check (pyright)
        run: pyright

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
